version: "3"

services:
  nginx:
    build: requirements/nginx
    container_name: nginx
    restart: always
    depends_on:
      - wordpress
    ports:
      - 443:443
    volumes:
      - wp-volume:/var/www/html/wordpress
    networks:
      - docker_network
    env_file:
      - .env
  mariadb:
    build: requirements/mariadb
    container_name: mariadb
    restart: always
    expose:
      - "3306"
    volumes:
      - db-volume:/var/lib/mysql
    networks:
      - docker_network
    env_file:
      - .env
  wordpress:
      build: requirements/wordpress
      container_name: wordpress
      restart: always
      depends_on:
        - mariadb
      expose:
        - "9000"
      volumes:
        - wp-volume:/var/www/html/wordpress
      networks:
        - docker_network
      env_file:
        - .env

networks:
  docker_network:
    driver: bridge

volumes:
  wp-volume:
    driver_opts:
      type: none
      o: bind
      device: /home/ylabrahm/data/wordpress
  db-volume:
    driver_opts:
      type: none
      o: bind
      device: /home/ylabrahm/data/database
